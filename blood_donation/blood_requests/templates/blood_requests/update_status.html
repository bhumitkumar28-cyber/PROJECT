{% extends 'blood_requests/base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-warning text-dark">
                <h4>Update Request Status</h4>
            </div>
            <div class="card-body">
                <h5>{{ request.patient_name }} - {{ request.blood_group }}</h5>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Current Status: <strong>{{ request.get_status_display }}</strong></label>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">New Status:</label>
                        <div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="status" value="fulfilled" id="fulfilled">
                                <label class="form-check-label" for="fulfilled">
                                    <i class="bi bi-check-circle text-success"></i> Fulfilled
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="status" value="cancelled" id="cancelled">
                                <label class="form-check-label" for="cancelled">
                                    <i class="bi bi-x-circle text-danger"></i> Cancelled
                                </label>
                            </div>
                        </div>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success">Update Status</button>
                        <a href="{{ request.get_absolute_url }}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
