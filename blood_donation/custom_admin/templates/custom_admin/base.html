<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Custom Admin{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<style>
body.dark-mode { 
    background: #1a1a1a !important; 
    color: #fff !important; 
}
body.dark-mode .card { 
    background: #2d2d2d !important; 
    color: #fff !important; 
}
body.dark-mode .table { 
    color: #fff !important; 
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // DARK MODE
    if (localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark-mode');
    }
    document.getElementById('darkToggle').onclick = function() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
    };
    
    // LIVE REFRESH (every 2 minutes)
    setInterval(() => location.reload(), 120000);
    
    // GLOBAL SEARCH (works on all pages)
    const searchInput = document.getElementById('searchInput');
    if (searchInput) {
        searchInput.onkeyup = function() {
            let filter = this.value.toLowerCase();
            document.querySelectorAll('tbody tr').forEach(row => {
                row.style.display = row.textContent.toLowerCase().includes(filter) ? '' : 'none';
            });
        };
    }
});
</script>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'custom_admin:dashboard' %}">
                <i class="fas fa-tint"></i> Blood Bank Admin
            </a>
            <button id="darkToggle" class="btn btn-outline-light ms-2" title="Toggle Dark Mode">
              <i class="fas fa-moon"></i>
            </button>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{% url 'custom_admin:dashboard' %}">Dashboard</a>
                <a class="nav-link" href="{% url 'custom_admin:manage_donors' %}">Donors</a>
                <a class="nav-link" href="{% url 'custom_admin:manage_requesters' %}">Requesters</a>
                <a class="nav-link" href="{% url 'custom_admin:manage_donations' %}">Donations</a>
                <a class="nav-link" href="{% url 'custom_admin:manage_blood_requests' %}">Requests</a>
                <a class="nav-link" href="{% url 'custom_admin:manage_blood_stock' %}">Stock</a>
                <a class="nav-link" href="{% url 'custom_admin:reports' %}">Reports</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
