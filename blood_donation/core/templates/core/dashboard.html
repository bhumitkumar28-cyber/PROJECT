{% extends 'accounts/base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-12">
            <div class="card shadow">
                <div class="card-body text-center p-5">
                    <h1 class="display-4 text-danger mb-4">
                        <i class="fas fa-tachometer-alt"></i> Dashboard
                    </h1>
                    <h3>Welcome, {{ user.get_full_name|default:user.username }}!</h3>
                    <p class="lead">You are logged in as: <strong>{{ user_type|title }}</strong></p>
                    
                    <div class="row mt-5">
                        <div class="col-md-4">
                            <a href="{% url 'accounts:profile' %}" class="btn btn-outline-danger btn-lg w-100 mb-3">
                                <i class="fas fa-user"></i> My Profile
                            </a>
                        </div>
                        <div class="col-md-4">
                            <a href="{% url 'core:about' %}" class="btn btn-outline-primary btn-lg w-100 mb-3">
                                <i class="fas fa-info-circle"></i> About
                            </a>
                        </div>
                        <div class="col-md-4">
                            <a href="{% url 'accounts:logout' %}" class="btn btn-danger btn-lg w-100 mb-3">
                                <i class="fas fa-sign-out-alt"></i> Logout
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
