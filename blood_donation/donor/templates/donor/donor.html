<!DOCTYPE html>
<html>
<head>
    <title>Donor List</title>
</head>
<body>
    <h1>Blood Donors</h1>
    {% if object_list %}
        <ul>
        {% for donor in object_list %}
            <li>{{ donor.name }} - {{ donor.blood_group }} ({{ donor.phone }})</li>
        {% endfor %}
        </ul>
    {% else %}
        <p>No donors available.</p>
    {% endif %}
</body>
</html>
